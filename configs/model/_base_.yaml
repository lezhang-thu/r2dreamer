act_entropy: 3e-4
kl_free: 1.0
imag_horizon: 15
horizon: 333
lamb: 0.95
compile: True
log_grads: False
device: ${device}
rep_loss: "r2dreamer"  # only supported rep loss
#imag_last: 0          # 0 = all T positions; >0 = K valid starts per episode
imag_last: 64          # 0 = all T positions; >0 = K valid starts per episode
wm_accum_steps: 1      # split replay batch for world-model grad accumulation
ac_accum_steps: 1      # split imagination starts for actor-critic grad accumulation

lr: 4e-5
agc: 0.3
pmin: 1e-3
eps: 1e-20
beta1: 0.9
beta2: 0.999
warmup: 1000
slow_target_update: 1
slow_target_fraction: 0.02

loss_scales:
  barlow: 0.05
  rew: 1.0
  con: 1.0
  dyn: 1.0
  rep: 0.1
  policy: 1.0
  value: 1.0

r2dreamer:
  lambd: 5e-4

rssm:
  stoch: 32
  unimix_ratio: 0.01

transformer:
  stoch: ${model.rssm.stoch}
  deter: ${model.deter}
  discrete: ${model.discrete}
  unimix_ratio: ${model.rssm.unimix_ratio}
  act: ${model.act}
  rope_base: 1000000.0
  rope_max_seq_len: 32768
  attn_dropout: 0.0
  norm_eps: 1e-6
  head_hidden: ${model.hidden}
  post_layers: 1
  prior_layers: 2
  n_heads: 16
  num_kv_heads: 8
  head_dim: 128
  n_layers: 28
  d_ff: 3072
  q_proj_bias: False
  k_proj_bias: False
  v_proj_bias: False
  output_proj_bias: False
  q_norm: True
  k_norm: True
  gated_mlp: True
  mlp_bias: False
  #window_size: 64
  window_size: ${batch_length}
  device: ${device}

encoder:
  mlp_keys: ${env.encoder.mlp_keys}
  cnn_keys: ${env.encoder.cnn_keys}
  mlp:
    shape: null
    layers: 3
    units: ${model.units}
    act: ${model.act}
    norm: ${model.norm}
    device: ${device}
    outscale: null
    symlog_inputs: True
    name: 'mlp_encoder'
  cnn:
    act: ${model.act}
    norm: ${model.norm}
    kernel_size: 3
    stem_stride: 2
    minres: 4
    depth: ${model.depth}  # base channel width; stage widths are depth * mults
    mults: [2, 3, 4, 4]
    blocks: [1, 1, 1, 1]  # one BasicBlock per stage = 8 main-path convs

reward:
  shape: [255,]
  layers: 1
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  dist:
    name: 'symexp_twohot'
    bin_num: 255
  outscale: 0.0
  device: ${device}
  symlog_inputs: False
  name: 'reward'

cont:
  shape: [1,]
  layers: 1
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  dist:
    name: 'binary'
  outscale: 1.0
  device: ${device}
  symlog_inputs: False
  name: 'cont'

actor:
  shape: null
  layers: 3
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  device: ${device}
  dist:
    cont:
      name: 'bounded_normal'
      min_std: 0.1
      max_std: 1.0
    disc:
      name: 'onehot'
      unimix_ratio: 0.01
    multi_disc:
      name: 'multi_onehot'
      unimix_ratio: 0.01
  outscale: 0.01
  symlog_inputs: False
  name: 'actor'

critic:
  shape: [255,]
  layers: 3
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  device: ${device}
  dist:
    name: 'symexp_twohot'
    bin_num: 255
  outscale: 0.0
  symlog_inputs: False
  name: 'value'
